global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Add Alertmanager here if used

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: "flask-app"
    static_configs:
      - targets: ["app:5000"]
    metrics_path: /metrics
    scrape_interval: 10s
